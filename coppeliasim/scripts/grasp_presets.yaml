# Пресеты захвата деталей вакуумным захватом IRB 140.
#
# Структура каждого пресета:
#   description:      текстовое описание позы (для отладки)
#   height_min:       минимальная высота верхней грани над лентой (метры)
#   height_max:       максимальная высота верхней грани над лентой (метры)
#   tilt_deg:         наклон gripper от вертикали (градусы, 0 = прямо вниз)
#   contact_offset:   [dx, dy] смещение точки захвата от bbox-центра (метры)
#                     dx — вдоль оси yaw детали
#                     dy — перпендикулярно оси yaw
#
# Высоты указаны для деталей, отмасштабированных ×2 в CoppeliaSim.
# НАСТРОИТЬ: уточнить height_min/max по результатам depth calibration
# (запустить depth_estimator.estimate_height_stats() для каждой позы).
#
# При смене деталей изменяется только этот файл — код GraspPlanner не трогается.

gaika:
  # Гайка шестигранная с буртиком ГОСТ 8918-69 (×2: S=34мм, H=30мм, буртик⌀44мм)

  - description: "Вертикально"
    height_min: 0.022
    height_max: 0.034
    tilt_deg: 0.0
    contact_offset: [0.013, 0.0]

  - description: "На боку — захват сбоку за плоскую грань шестигранника"
    height_min: 0.035
    height_max: 0.05
    tilt_deg: 30.0
    contact_offset: [0.0, 0.015]

vilka:
  # Вилка с резьбовым отверстием ГОСТ 12470-67 (×2: B=64мм, S=50мм, H≈76мм)

  - description: "Основание вниз — захват за заднюю стенку U-паза"
    height_min: 0.065
    height_max: 0.085
    tilt_deg: 0.0
    contact_offset: [0.0, 0]   # смещение к задней стенке (от U-паза)

  - description: "Задняя стенка вниз — захват сверху за спинку корпуса"
    height_min: 0.040
    height_max: 0.065
    tilt_deg: 0.0
    contact_offset: [0.032, 0.0]

  - description: "Боковая грань вниз — захват сбоку за торцевую стенку"
    height_min: 0.020
    height_max: 0.040
    tilt_deg: 0.0
    contact_offset: [0, 0.0]

vtulka:
  # Втулка (цилиндр с фланцем, ⌀тело≈30мм, ⌀фланец≈60мм, H≈60мм)

  - description: "Вертикально (фланец вниз) — захват сверху за торец тела"
    height_min: 0.048
    height_max: 0.065
    tilt_deg: 0.0
    contact_offset: [0.00, 0.00]

  - description: "На боку — захват сбоку за тело цилиндра"
    height_min: 0.020
    height_max: 0.048
    tilt_deg: 0.0
    contact_offset: [0.00, 0.0]

  - description: "Фланец вниз, тело наклонено — захват сверху за фланец"
    height_min: 0.002
    height_max: 0.020
    tilt_deg: 0.0
    contact_offset: [0.0, 0.0]
